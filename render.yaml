services:
  - type: web
    name: nba-prop-lab
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT run:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: prop-lab-db
          property: connectionString
      - key: FLASK_ENV
        value: production

databases:
  - name: prop-lab-db
    plan: free
