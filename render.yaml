services:
  - type: web
    name: nba-prop-lab
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "app:create_app()" --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: prop-lab-db
          property: connectionString
      - key: FLASK_ENV
        value: production

  # Runs at 6am CDT (11am UTC) daily
  # Fetches NBA stats, matchups, opponent defense, computes results/parlays/trending
  - type: cron
    name: daily-data-refresh
    runtime: python
    schedule: "0 11 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/daily_update.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: prop-lab-db
          property: connectionString

  # Runs every hour
  # Fetches fresh PrizePicks lines and recomputes results/parlays/trending
  - type: cron
    name: prizepicks-hourly-refresh
    runtime: python
    schedule: "0 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/fetch_data.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: prop-lab-db
          property: connectionString

databases:
  - name: prop-lab-db
    plan: free
