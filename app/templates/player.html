<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>NBA Prop Lab - Player</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/static/css/base.css" />
    <link rel="stylesheet" href="/static/css/player.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Fredoka+One&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="/static/proplab.svg" />
  </head>
  <body>
    <nav>
      <a href="/" class="nav-logo">
        Prop Lab
        <img src="/static/proplab.svg" alt="Prop Lab" class="nav-logo-icon" />
      </a>

      <div class="nav-links">
        <a href="/">Players</a>
        <a href="/discover">Discover</a>
      </div>
    </nav>

    <div class="page">
      <div class="player-header">
        <div class="player-avatar" id="avatar"></div>
        <div>
          <h1 id="player-name">Loading...</h1>
          <p id="player-meta"></p>
        </div>
      </div>

      <div class="controls-card">
        <h3>Prop Settings</h3>
        <div class="controls">
          <div class="control-group">
            <label>Stat</label>
            <select id="stat">
              <option value="pts">Points</option>
              <option value="reb">Rebounds</option>
              <option value="ast">Assists</option>
              <option value="stl">Steals</option>
              <option value="blk">Blocks</option>
              <option value="fg3m">3PM</option>
              <option value="tov">Turnovers</option>
            </select>
          </div>
          <div class="control-group">
            <label>Line</label>
            <input id="line" type="number" step="0.5" value="20.5" />
          </div>
          <div class="control-group">
            <label>Sample</label>
            <select id="last_n">
              <option value="">All games</option>
              <option value="5">Last 5</option>
              <option value="10">Last 10</option>
              <option value="20">Last 20</option>
            </select>
          </div>
          <div class="control-group">
            <label>Location</label>
            <select id="location">
              <option value="">All</option>
              <option value="Home">Home</option>
              <option value="Road">Road</option>
            </select>
          </div>
          <button class="btn" onclick="loadProps()">Update</button>
        </div>
      </div>

      <div class="stat-grid">
        <div class="hit-rate-card">
          <div class="ring-wrap">
            <svg width="80" height="80" viewBox="0 0 80 80">
              <circle class="ring-bg" cx="40" cy="40" r="32" />
              <circle
                class="ring-fill"
                id="ring"
                cx="40"
                cy="40"
                r="32"
                stroke-dasharray="201"
                stroke-dashoffset="201"
              />
            </svg>
            <div class="ring-text" id="hit-rate-text">--%</div>
          </div>
          <div class="label">Hit Rate</div>
        </div>
        <div class="stat-card">
          <div class="value" id="hits">--</div>
          <div class="label">Hits / Games</div>
        </div>
        <div class="stat-card">
          <div class="value" id="avg">--</div>
          <div class="label">Average</div>
        </div>
        <div class="stat-card">
          <div class="value" id="max" style="color: #10b981">--</div>
          <div class="label">Season High</div>
        </div>
        <div class="stat-card">
          <div class="value" id="min-val" style="color: #ef4444">--</div>
          <div class="label">Season Low</div>
        </div>
      </div>

      <div class="chart-card">
        <h3 id="chart-title">Last 10 Games</h3>
        <canvas id="chart" height="90"></canvas>
      </div>

      <div class="table-card">
        <h3>Game Log</h3>
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Matchup</th>
              <th>Stat</th>
              <th>Result</th>
            </tr>
          </thead>
          <tbody id="game-rows"></tbody>
        </table>
      </div>
    </div>

    <script>
      const playerId = {{ player_id }};
      let chartInstance = null;

      fetch(`/api/players/${playerId}`).then(r => r.json()).then(p => {
        document.getElementById("player-name").textContent = p.name;
        document.getElementById("player-meta").textContent = `${p.team} · ${p.position}`;
        document.getElementById("avatar").innerHTML =
          `<img src="https://cdn.nba.com/headshots/nba/latest/260x190/${playerId}.png" alt="${p.name}" />`;
      });

      function setRing(pct) {
        const offset = 201 - (pct / 100) * 201;
        const ring = document.getElementById("ring");
        ring.style.strokeDashoffset = offset;
        ring.style.stroke = pct >= 60 ? "#10b981" : pct <= 40 ? "#ef4444" : "#6366f1";
      }

      function loadProps() {
        const stat     = document.getElementById("stat").value;
        const line     = document.getElementById("line").value;
        const last_n   = document.getElementById("last_n").value;
        const location = document.getElementById("location").value;

        let url = `/api/players/${playerId}/props?stat=${stat}&line=${line}`;
        if (last_n)   url += `&last_n=${last_n}`;
        if (location) url += `&location=${location}`;

        fetch(url).then(r => r.json()).then(data => {
          if (data.error) { alert(data.error); return; }

          const pct = (data.hit_rate * 100).toFixed(1);
          document.getElementById("hit-rate-text").textContent = pct + "%";
          document.getElementById("hits").textContent    = `${data.hits}/${data.sample}`;
          document.getElementById("avg").textContent     = data.avg;
          document.getElementById("max").textContent     = data.max;
          document.getElementById("min-val").textContent = data.min;
          setRing(parseFloat(pct));

          const statLabel = document.getElementById("stat").selectedOptions[0].text;
          document.getElementById("chart-title").textContent = `${statLabel} — Last ${data.games.length} Games`;

          const labels  = data.games.map(g => g.date).reverse();
          const values  = data.games.map(g => g[stat]).reverse();
          const lineVal = parseFloat(line);

          if (chartInstance) chartInstance.destroy();
          chartInstance = new Chart(document.getElementById("chart"), {
            type: "bar",
            data: {
              labels,
              datasets: [
                {
                  label: statLabel,
                  data: values,
                  backgroundColor: values.map(v =>
                    v > lineVal ? "rgba(16,185,129,0.75)" : "rgba(239,68,68,0.65)"
                  ),
                  borderRadius: 6,
                  borderSkipped: false,
                },
                {
                  label: `Line (${lineVal})`,
                  data: Array(labels.length).fill(lineVal),
                  type: "line",
                  borderColor: "#6366f1",
                  borderWidth: 2,
                  borderDash: [6, 4],
                  pointRadius: 0,
                  fill: false,
                }
              ]
            },
            options: {
              responsive: true,
              animation: { duration: 600, easing: "easeOutQuart" },
              plugins: {
                legend: { labels: { font: { family: "Inter", size: 12 }, color: "#6b7280" } },
                tooltip: {
                  backgroundColor: "#fff",
                  titleColor: "#1a1d23",
                  bodyColor: "#6b7280",
                  borderColor: "#e8ecf0",
                  borderWidth: 1,
                  padding: 12,
                  cornerRadius: 10,
                  titleFont: { family: "Inter", weight: "700" },
                  bodyFont:  { family: "Inter" },
                }
              },
              scales: {
                x: {
                  grid: { display: false },
                  ticks: { color: "#9ca3af", font: { family: "Inter", size: 11 } }
                },
                y: {
                  grid: { color: "#f0f0f5" },
                  ticks: { color: "#9ca3af", font: { family: "Inter", size: 11 } }
                }
              }
            }
          });

          const tbody = document.getElementById("game-rows");
          tbody.innerHTML = "";
          data.games.forEach(g => {
            const hit = g[stat] > lineVal;
            tbody.innerHTML += `
              <tr class="data-row">
                <td>${g.date}</td>
                <td>${g.matchup}</td>
                <td><strong>${g[stat]}</strong></td>
                <td><span class="hit-pill ${hit ? "hit" : "miss"}">${hit ? "✓ Hit" : "✗ Miss"}</span></td>
              </tr>`;
          });
        });
      }

      loadProps();
    </script>
  </body>
</html>
