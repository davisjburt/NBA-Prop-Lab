<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>NBA Prop Lab</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/css/base.css" />
    <link rel="stylesheet" href="/static/css/index.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Fredoka+One&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="/static/proplab.svg" />
  </head>
  <body>
    <nav>
      <a href="/" class="nav-logo">
        Prop Lab
        <img src="/static/proplab.svg" alt="Prop Lab" class="nav-logo-icon" />
      </a>

      <div class="nav-links">
        <a href="/" class="active">Players</a>
        <a href="/discover">Discover</a>
      </div>
    </nav>

    <div class="hero">
      <h1>Find the <span>edge</span> on<br />every prop bet.</h1>
      <p>Real hit rates, real game logs, zero guessing.</p>
    </div>

    <div class="search-bar">
      <input
        type="text"
        id="search"
        placeholder="🔍  Search players..."
        oninput="filterPlayers()"
      />
    </div>

    <div class="player-grid" id="player-grid"></div>

    <script>
      let allPlayers = [];

      function renderPlayers(players) {
        const grid = document.getElementById("player-grid");
        grid.innerHTML = "";
        players.forEach((p, i) => {
          const card = document.createElement("div");
          card.className = "player-card";
          card.style.animationDelay = `${i * 0.05}s`;
          card.innerHTML = `
          <div class="player-avatar">
            <img src="https://cdn.nba.com/headshots/nba/latest/260x190/${p.id}.png" alt="${p.name}" />
          </div>
          <div class="player-info">
            <div class="player-name">${p.name}</div>
            <div class="player-meta">${p.team}</div>
          </div>
          <div class="player-badges">
            <span class="badge">${p.position}</span>
          </div>`;
          card.onclick = () => (window.location.href = `/player/${p.id}`);
          grid.appendChild(card);
        });
      }

      function filterPlayers() {
        const q = document.getElementById("search").value.toLowerCase();
        renderPlayers(
          allPlayers.filter(
            (p) =>
              p.name.toLowerCase().includes(q) ||
              p.team.toLowerCase().includes(q),
          ),
        );
      }

      fetch("/api/players")
        .then((r) => r.json())
        .then((data) => {
          allPlayers = data;
          renderPlayers(allPlayers);
        });
    </script>
  </body>
</html>
