<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>NBA Prop Lab — Model Stats</title>
    <link rel="icon" type="image/svg+xml" href="/static/proplab.svg" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/css/base.css" />
    <link rel="stylesheet" href="/static/css/model-stats.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body>
    <nav>
      <a href="/" class="nav-logo">
        <img src="/static/proplab.svg" class="nav-logo-icon" /> Prop Lab
      </a>
      <div class="nav-links">
        <a href="/"><i data-lucide="users"></i> Players</a>
        <a href="/explore"><i data-lucide="compass"></i> Explore</a>
        <a href="/prizepicks"><i data-lucide="list"></i> Player Props</a>
        <a href="/moneylines"><i data-lucide="trending-up"></i> Moneylines</a>
        <a href="/model-stats" class="active"
          ><i data-lucide="bar-chart-3"></i> Model Stats</a
        >
      </div>
    </nav>

    <div class="page-wide">
      <div class="page-header">
        <h1>Model Stats</h1>
        <p>
          Outcomes for model props and moneylines (last
          <span id="days-label">30</span> days)
        </p>
      </div>

      <div class="controls-card">
        <div class="controls">
          <div class="control-group">
            <label for="days-select">Window</label>
            <select id="days-select">
              <option value="7">7 days</option>
              <option value="30" selected>30 days</option>
              <option value="90">90 days</option>
            </select>
          </div>
        </div>
      </div>

      <div id="model-stats-loading" class="loading-state">
        <i data-lucide="loader"></i> Loading model stats…
      </div>
      <div id="model-stats-error" class="empty-state" hidden></div>

      <div id="model-stats-content" hidden>
        <div class="stats-layout">
          <!-- Moneylines card: total % then individual lines -->
          <div class="table-card">
            <h3><i data-lucide="trending-up"></i> Moneylines</h3>
            <div class="summary-block">
              <div class="summary-value" id="moneylines-summary">—</div>
              <div class="summary-label">W – L (Hit %)</div>
            </div>
            <table>
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Matchup</th>
                  <th>Pick</th>
                  <th>Result</th>
                  <th>Margin</th>
                </tr>
              </thead>
              <tbody id="ml-sample-body"></tbody>
            </table>
          </div>

          <!-- Props card: overall row + per-stat rows + individual props -->
          <div class="table-card">
            <h3><i data-lucide="bar-chart-3"></i> Player Props</h3>
            <table>
              <thead>
                <tr>
                  <th>Stat</th>
                  <th class="numeric">Bets</th>
                  <th class="numeric">Hits</th>
                  <th class="numeric">Hit %</th>
                </tr>
              </thead>
              <tbody id="props-table-body"></tbody>
            </table>

            <div
              style="
                margin-top: 0.75rem;
                border-top: 1px solid var(--border);
                padding-top: 0.75rem;
              "
            >
              <table>
                <thead>
                  <tr>
                    <th>Date</th>
                    <th>Player</th>
                    <th>Stat</th>
                    <th>Line</th>
                    <th>Result</th>
                  </tr>
                </thead>
                <tbody id="props-sample-body"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const loadingEl = document.getElementById("model-stats-loading");
      const errorEl = document.getElementById("model-stats-error");
      const contentEl = document.getElementById("model-stats-content");

      const moneylinesSummary = document.getElementById("moneylines-summary");
      const daysSelect = document.getElementById("days-select");
      const daysLabel = document.getElementById("days-label");

      const propsTbody = document.getElementById("props-table-body");
      const propsSampleBody = document.getElementById("props-sample-body");
      const mlSampleBody = document.getElementById("ml-sample-body");

      function hitClass(rate) {
        if (rate == null) return "";
        if (rate >= 0.7) return "rate-high";
        if (rate <= 0.4) return "rate-low";
        return "rate-mid";
      }

      function outcomeClass(hit) {
        if (hit === null || hit === undefined) return "";
        return hit ? "hit-pill hit" : "hit-pill miss";
      }

      async function loadModelStats(days) {
        loadingEl.hidden = false;
        errorEl.hidden = true;
        contentEl.hidden = true;

        moneylinesSummary.textContent = "—";
        propsTbody.innerHTML = "";
        propsSampleBody.innerHTML = "";
        mlSampleBody.innerHTML = "";
        daysLabel.textContent = days;

        try {
          const resp = await fetch(`/api/model_outcomes?days=${days}`);
          if (!resp.ok) throw new Error(`Request failed: ${resp.status}`);
          const data = await resp.json();

          // Moneylines summary
          const ml = data.moneylines || { bets: 0, hits: 0, hit_rate: null };
          const misses = ml.bets - ml.hits;
          const pct = ml.hit_rate != null ? Math.round(ml.hit_rate * 100) : 0;
          moneylinesSummary.innerHTML = `
            <span class="${hitClass(ml.hit_rate)}">
              ${ml.hits}–${misses}
            </span>
            <span class="summary-pct">(${pct}%)</span>
          `;

          // Player props: overall row then per-stat rows
          const props = data.props || [];
          const overall = data.prop_overall || {
            bets: 0,
            hits: 0,
            hit_rate: null,
          };

          const overallRate =
            overall.hit_rate != null
              ? Math.round(overall.hit_rate * 100)
              : null;

          // Overall row at top
          const overallRow = document.createElement("tr");
          overallRow.className = "data-row";
          overallRow.innerHTML = `
            <td><strong>All props</strong></td>
            <td class="numeric">${overall.bets}</td>
            <td class="numeric">${overall.hits}</td>
            <td class="numeric">
              <span class="rate-badge ${hitClass(overall.hit_rate)}">
                ${overallRate != null ? overallRate + "%" : "—"}
              </span>
            </td>
          `;
          propsTbody.appendChild(overallRow);

          // Per-stat rows
          if (!props.length) {
            const row = document.createElement("tr");
            const cell = document.createElement("td");
            cell.colSpan = 4;
            cell.innerHTML =
              '<div class="empty-state">No prop outcomes yet for this window.</div>';
            row.appendChild(cell);
            propsTbody.appendChild(row);
          } else {
            props.forEach((p) => {
              const rate =
                p.hit_rate != null ? Math.round(p.hit_rate * 100) : null;
              const row = document.createElement("tr");
              row.className = "data-row";
              row.innerHTML = `
                <td>${p.stat}</td>
                <td class="numeric">${p.bets}</td>
                <td class="numeric">${p.hits}</td>
                <td class="numeric">
                  <span class="rate-badge ${hitClass(p.hit_rate)}">
                    ${rate != null ? rate + "%" : "—"}
                  </span>
                </td>
              `;
              propsTbody.appendChild(row);
            });
          }

          // Individual prop results
          (data.sample_props || []).forEach((p) => {
            const tr = document.createElement("tr");
            tr.innerHTML = `
              <td>${p.date}</td>
              <td>${p.player_name} (${p.team_abbr})</td>
              <td>${p.stat}</td>
              <td>${p.line}</td>
              <td>
                <span class="${outcomeClass(p.hit)}">
                  ${p.hit ? "Hit" : "Miss"}
                </span>
              </td>
            `;
            propsSampleBody.appendChild(tr);
          });

          // Individual moneyline results
          (data.sample_moneylines || []).forEach((g) => {
            const matchup = `${g.away_abbr} @ ${g.home_abbr}`;
            const label = g.correct ? "Correct" : "Wrong";
            const tr = document.createElement("tr");
            tr.innerHTML = `
              <td>${g.date}</td>
              <td>${matchup}</td>
              <td>${g.predicted_winner}</td>
              <td>
                <span class="${outcomeClass(g.correct)}">${label}</span>
              </td>
              <td>${g.margin ?? "—"}</td>
            `;
            mlSampleBody.appendChild(tr);
          });

          loadingEl.hidden = true;
          contentEl.hidden = false;
          lucide.createIcons();
        } catch (err) {
          console.error(err);
          loadingEl.hidden = true;
          errorEl.hidden = false;
          errorEl.textContent = "Failed to load model stats. Try again later.";
        }
      }

      daysSelect.addEventListener("change", () => {
        loadModelStats(daysSelect.value);
      });

      window.addEventListener("DOMContentLoaded", () => {
        lucide.createIcons();
        loadModelStats(daysSelect.value || 30);
      });
    </script>
  </body>
</html>
