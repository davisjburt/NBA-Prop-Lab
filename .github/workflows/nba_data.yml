name: NBA Daily Data Refresh

on:
  schedule:
    # Runs at 10am ET (2pm UTC) daily
    - cron: "0 14 * * *"

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  update-game-logs:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install flask flask-sqlalchemy psycopg2-binary requests pandas numpy nba_api gunicorn

      - name: Run daily update (game logs → Postgres)
        run: python scripts/daily_update.py
